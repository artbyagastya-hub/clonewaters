name: Agentic SEO Updater

on:
  schedule:
    # Run at midnight every Sunday
    - cron: '0 0 * * 0'
  workflow_dispatch: # Allow manual trigger

jobs:
  seo_agent:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Scrape Competitor Data
        run: node scripts/seo-scraper.js

      - name: Generate SEO Recommendations (Gemini)
        run: node scripts/seo-agent.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Inject New SEO Tags
        run: node scripts/seo-injector.js

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: '🤖 SEO Auto-Optimization completed'
          title: 'Automated SEO Update: AI Meta Tag Optimization'
          body: |
            ## Agentic SEO Report
            This PR was generated automatically by the Clone Waters SEO Agent.
            
            It analyzed competitor meta tags and used Gemini to suggest optimized alternatives. The changes have been injected into `index.html`.
            
            Please review the changes and merge if they align with the brand.
          branch: agentic-seo-updates
          base: main
          labels: 'seo, automated'
          assignees: artbyagastya-hub
          reviewers: artbyagastya-hub
